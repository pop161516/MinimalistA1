<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finding Space - MA1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="overlay">
        <h2>Finding Space</h2>
        <p style="opacity: 0.6; margin-bottom: 10px;">Play this outside.</p>
        <p style="opacity: 0.6; margin-bottom: 10px;">Turn your volume up.</p>
        <p style="opacity: 0.6; margin-bottom: 30px;">Put your phone in your pocket.</p>
        <button id="start-btn">BEGIN</button>
    </div>

    <div id="game-container">
        <div id="player" class="cube"></div>
        <div id="target" class="cube"></div>
    </div>

    <div class="controls">
        <label style="color: #444; font-size: 10px; margin-right: 8px; letter-spacing: 1px; text-transform: uppercase;">Endless</label>
        <input type="checkbox" id="endless-toggle">
    </div>

    <script src="script.js" defer></script>
</body>
</html>
