<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Audio Compass - Test Mode</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Helvetica Neue', sans-serif; touch-action: none; color: #666; }
        #game-container { width: 100vw; height: 100vh; position: relative; }
        
        .cube { position: absolute; width: 30px; height: 30px; border-radius: 50%; transform: translate(-50%, -50%); }
        
        #player { 
            background: #ffffff; 
            box-shadow: 0 0 15px rgba(255,255,255,0.4); 
            z-index: 10; 
        }

        #target { 
            background: rgba(255, 157, 0, 0.6); /* Visible for testing */
            border: 2px solid #ff9d00;
            box-shadow: 0 0 20px #ff9d00;
            z-index: 5;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; }
        }

        #ui-layer { position: fixed; top: 20px; left: 20px; z-index: 20; font-size: 0.7rem; letter-spacing: 1px; }
        .controls { position: fixed; bottom: 30px; right: 20px; z-index: 20; background: rgba(255,255,255,0.05); padding: 10px 15px; border-radius: 10px; }
        #overlay { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: white; }
        button { padding: 15px 30px; background: none; border: 1px solid white; color: white; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="overlay">
        <h2>Developer Test Mode</h2>
        <p style="opacity: 0.6; margin-bottom: 20px;">Target is visible for calibration.</p>
        <button id="start-btn">Start Test</button>
    </div>

    <div id="ui-layer">
        <div id="status">Syncing GPS...</div>
    </div>

    <div class="controls">
        <label style="color: #888; font-size: 11px;">Endless Mode</label>
        <input type="checkbox" id="endless-toggle">
    </div>

    <div id="game-container">
        <div id="player" class="cube"></div>
        <div id="target" class="cube"></div>
    </div>

    <script>
        const player = document.getElementById('player');
        const target = document.getElementById('target');
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const status = document.getElementById('status');
        const endlessToggle = document.getElementById('endless-toggle');

        let playerPos = { x: window.innerWidth/2, y: window.innerHeight/2 };
        let targetPos = { x: 0, y: 0 };
        let originCoords = null;
        let lastDist = 999999;
        let noiseOffset = 0;
        const SENSITIVITY = 2500000; // High sensitivity for small rooms
        const SMOOTHING = 0.08;      // Lower = smoother but "laggier", Higher = snappier
        let rawGPSPos = { x: window.innerWidth/2, y: window.innerHeight/2 };

        let audioCtx, osc1, osc2, filter, mainGain;

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            osc1 = audioCtx.createOscillator();
            osc2 = audioCtx.createOscillator();
            filter = audioCtx.createBiquadFilter();
            mainGain = audioCtx.createGain();

            osc1.type = 'triangle'; 
            osc2.type = 'sine';
            osc1.frequency.value = 98; 
            osc2.frequency.value = 99; 

            filter.type = 'lowpass';
            filter.frequency.value = 200; 
            mainGain.gain.value = 0.03; 

            osc1.connect(filter);
            osc2.connect(filter);
            filter.connect(mainGain);
            mainGain.connect(audioCtx.destination);

            osc1.start();
            osc2.start();
        }

        function playPing() {
            if (!audioCtx) return;
            const pingOsc = audioCtx.createOscillator();
            const pingGain = audioCtx.createGain();
            pingOsc.type = 'sine';
            pingOsc.frequency.setValueAtTime(880, audioCtx.currentTime); 
            pingGain.gain.setValueAtTime(0, audioCtx.currentTime);
            pingGain.gain.linearRampToValueAtTime(0.04, audioCtx.currentTime + 0.05);
            pingGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
            pingOsc.connect(pingGain);
            pingGain.connect(audioCtx.destination);
            pingOsc.start();
            pingOsc.stop(audioCtx.currentTime + 0.4);
        }

        function moveTarget() {
    // Keeps target at least 50px away from edges so it never goes off-screen
    const padding = 50;
    targetPos.x = Math.random() * (window.innerWidth - (padding * 2)) + padding;
    targetPos.y = Math.random() * (window.innerHeight - (padding * 2)) + padding;
    target.style.left = `${targetPos.x}px`;
    target.style.top = `${targetPos.y}px`;
}

        function update() {
    // 1. Endless Mode Bounds Check
    if (endlessToggle.checked) {
        noiseOffset += 0.005;
        let nextX = targetPos.x + Math.sin(noiseOffset) * 0.8;
        let nextY = targetPos.y + Math.cos(noiseOffset * 0.7) * 0.8;

        // Strict Screen Boundary Enforcement
        const pad = 30;
        if (nextX > pad && nextX < window.innerWidth - pad) targetPos.x = nextX;
        if (nextY > pad && nextY < window.innerHeight - pad) targetPos.y = nextY;

        target.style.left = `${targetPos.x}px`;
        target.style.top = `${targetPos.y}px`;
    }

    // 2. SMOOTHING ENGINE (The "Secret Sauce")
    // Instead of teleporting the player to the jumpy GPS spot, 
    // we move them a small percentage of the way there every frame.
    playerPos.x += (rawGPSPos.x - playerPos.x) * SMOOTHING;
    playerPos.y += (rawGPSPos.y - playerPos.y) * SMOOTHING;

    player.style.left = `${playerPos.x}px`;
    player.style.top = `${playerPos.y}px`;

    // 3. Audio & Collision (Same as before)
    if (osc1) {
        const dist = Math.sqrt(Math.pow(playerPos.x - targetPos.x, 2) + Math.pow(playerPos.y - targetPos.y, 2));
        const proximity = Math.max(0, 1 - (dist / 600)); 
        filter.frequency.setTargetAtTime(150 + (proximity * 800), audioCtx.currentTime, 0.1);
        mainGain.gain.setTargetAtTime(0.02 + (proximity * 0.05), audioCtx.currentTime, 0.1);

        if (dist < 40) {
            playPing(); 
            moveTarget();
        }
    }
    requestAnimationFrame(update);
}

        function handleLocation(position) {
    const { latitude, longitude, accuracy } = position.coords;
    
    status.innerText = accuracy < 15 ? "CONNECTION: GOOD" : "CONNECTION: POOR";
    status.style.color = accuracy < 15 ? "#00ff88" : "#ff4444";

    if (!originCoords) {
        originCoords = { lat: latitude, lng: longitude };
        return;
    }

    // Calculate Raw Position
    const dy = (originCoords.lat - latitude) * SENSITIVITY;
    const dx = (longitude - originCoords.lng) * SENSITIVITY;

    // We store the "Jumpy" GPS data here
    rawGPSPos.x = (window.innerWidth / 2) + dx;
    rawGPSPos.y = (window.innerHeight / 2) + dy;

    // Ping Logic
    const currentDist = Math.sqrt(Math.pow(playerPos.x - targetPos.x, 2) + Math.pow(playerPos.y - targetPos.y, 2));
    if (currentDist < lastDist - 1.5) { 
        playPing();
    }
    lastDist = currentDist;
}

        startBtn.addEventListener('click', () => {
            initAudio();
            moveTarget();
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition(handleLocation, null, {
                    enableHighAccuracy: true,
                    maximumAge: 0
                });
            }
            overlay.style.display = 'none';
            requestAnimationFrame(update);
        });
    </script>
</body>
</html>
