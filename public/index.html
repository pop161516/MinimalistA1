<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finding space - MA1</title>
</head>
<body>
    <div id="overlay">
        <h2>Finding space</h2>
        <p style="opacity: 0.6; margin-bottom: 20px;">Play this outside.</p>
        <p style="opacity: 0.6; margin-bottom: 20px;">Turn your volume up.</p>
        <p style="opacity: 0.6; margin-bottom: 20px;">Put your phone in your pocket.</p>

        <button id="start-btn">Continue</button>
    </div>

    <div id="ui-layer">
        <div id="status">Syncing GPS...</div>
    </div>

    <div id="game-container">
        <div id="player" class="cube"></div>
        <div id="target" class="cube"></div>
    </div>

    <div class="controls">
        <div style="margin-bottom: 8px;">
            <label style="color: #888; font-size: 11px;">Tilt Steering</label>
            <input type="checkbox" id="tilt-toggle">
        </div>
        <div>
            <label style="color: #888; font-size: 11px;">Endless Mode</label>
            <input type="checkbox" id="endless-toggle">
        </div>
    </div>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</body>
</html>
