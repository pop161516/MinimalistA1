<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Min-assignment1-limits and constraints</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #121212;
            font-family: sans-serif;
            touch-action: none;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .cube {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 8px;
            transform: translate(-50%, -50%);
        }

        #player {
            background: #00ffcc;
            box-shadow: 0 0 20px #00ffcc;
            z-index: 2;
        }

        #target {
            background: #ff0055;
            box-shadow: 0 0 20px #ff0055;
            z-index: 1;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        button {
            padding: 20px 40px;
            font-size: 1.2rem;
            background: #00ffcc;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="start-btn">Start Experience</button>
    </div>

    <div id="game-container">
        <div id="player" class="cube"></div>
        <div id="target" class="cube"></div>
    </div>

    <script>
        const player = document.getElementById('player');
const target = document.getElementById('target');
const startBtn = document.getElementById('start-btn');
const overlay = document.getElementById('overlay');

let playerPos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
let targetPos = { x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight };
let originCoords = null; // Your starting point in the room

// Sensitivity: Higher number = more movement on screen for every step taken
const SENSITIVITY = 100000; 

let audioCtx, oscillator, gainNode;

function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    oscillator = audioCtx.createOscillator();
    gainNode = audioCtx.createGain();
    oscillator.type = 'triangle'; // Slightly fuller sound for walking
    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    oscillator.start();
}

function handleLocation(position) {
    const { latitude, longitude } = position.coords;

    // Set the "center of the room" the first time we get a signal
    if (!originCoords) {
        originCoords = { lat: latitude, lng: longitude };
        target.style.left = `${targetPos.x}px`;
        target.style.top = `${targetPos.y}px`;
        return;
    }

    // Calculate offset from origin
    // Difference in Lat is Y, difference in Lng is X
    const dy = (originCoords.lat - latitude) * SENSITIVITY;
    const dx = (longitude - originCoords.lng) * SENSITIVITY;

    // Apply to screen center
    playerPos.x = (window.innerWidth / 2) + dx;
    playerPos.y = (window.innerHeight / 2) + dy;

    // Update Visuals
    player.style.left = `${playerPos.x}px`;
    player.style.top = `${playerPos.y}px`;

    updateAudio();
}

function updateAudio() {
    if (!oscillator) return;

    const dist = Math.sqrt(
        Math.pow(playerPos.x - targetPos.x, 2) + 
        Math.pow(playerPos.y - targetPos.y, 2)
    );

    const maxDist = 500; // Define a "hearing range" in pixels
    const proximity = Math.max(0, 1 - (dist / maxDist)); 
    
    // Frequency shifts from 200Hz to 1000Hz as you get closer
    const freq = 200 + (proximity * 800);
    oscillator.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.1);

    // Collision detection
    if (dist < 50) {
        alert("Target Found!");
        location.reload(); // Reset for a new game
    }
}

startBtn.addEventListener('click', () => {
    initAudio();
    
    if ("geolocation" in navigator) {
        // enableHighAccuracy is CRITICAL for indoor/small movement
        navigator.geolocation.watchPosition(handleLocation, (err) => {
            alert("Please enable GPS/Location services.");
        }, {
            enableHighAccuracy: true,
            maximumAge: 0,
            timeout: 5000
        });
    }

    overlay.style.display = 'none';
});

    </script>
</body>
</html>
