<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Min-assignment1-limits and constraints</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #121212;
            font-family: sans-serif;
            touch-action: none;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .cube {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 8px;
            transform: translate(-50%, -50%);
        }

        #player {
            background: #00ffcc;
            box-shadow: 0 0 20px #00ffcc;
            z-index: 2;
        }

        #target {
            background: #ff0055;
            box-shadow: 0 0 20px #ff0055;
            z-index: 1;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        button {
            padding: 20px 40px;
            font-size: 1.2rem;
            background: #00ffcc;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="start-btn">Start Experience</button>
    </div>

    <div id="game-container">
        <div id="player" class="cube"></div>
        <div id="target" class="cube"></div>
    </div>

    <script>
        const player = document.getElementById('player');
        const target = document.getElementById('target');
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');

        let playerPos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        let targetPos = { x: 0, y: 0 };
        
        // Audio Context (Web Audio API)
        let audioCtx, oscillator, gainNode;

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            oscillator = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(220, audioCtx.currentTime); // Starting A note
            
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
        }

        function moveTarget() {
            targetPos.x = Math.random() * (window.innerWidth - 50) + 25;
            targetPos.y = Math.random() * (window.innerHeight - 50) + 25;
            target.style.left = `${targetPos.x}px`;
            target.style.top = `${targetPos.y}px`;
        }

        function updatePosition(e) {
            // Beta is tilt front-to-back (-180 to 180)
            // Gamma is tilt left-to-right (-90 to 90)
            let dx = e.gamma * 5; // Sensitivity multiplier
            let dy = e.beta * 5;

            playerPos.x = Math.max(25, Math.min(window.innerWidth - 25, playerPos.x + dx));
            playerPos.y = Math.max(25, Math.min(window.innerHeight - 25, playerPos.y + dy));

            player.style.left = `${playerPos.x}px`;
            player.style.top = `${playerPos.y}px`;

            updateAudio();
        }

        function updateAudio() {
            if (!oscillator) return;

            // Calculate distance between player and target
            const dist = Math.sqrt(
                Math.pow(playerPos.x - targetPos.x, 2) + 
                Math.pow(playerPos.y - targetPos.y, 2)
            );

            // Max distance is roughly the screen diagonal
            const maxDist = Math.sqrt(Math.pow(window.innerWidth, 2) + Math.pow(window.innerHeight, 2));
            
            // Inverse relationship: closer = higher frequency
            // Mapping distance to frequency range (220Hz to 880Hz)
            const proximity = 1 - (dist / maxDist); 
            const freq = 220 + (proximity * 660);
            
            oscillator.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.05);

            // Check for "collision"
            if (dist < 40) {
                moveTarget(); // Jump to new spot
            }
        }

        startBtn.addEventListener('click', () => {
            // Request permission for iOS 13+
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(response => {
                        if (response === 'granted') {
                            window.addEventListener('deviceorientation', updatePosition);
                        }
                    })
                    .catch(console.error);
            } else {
                window.addEventListener('deviceorientation', updatePosition);
            }

            initAudio();
            moveTarget();
            overlay.style.display = 'none';
        });

    </script>
</body>
</html>
