<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ambient Walking Tracker</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0c; font-family: 'Segoe UI', sans-serif; touch-action: none; color: white; }
        #game-container { width: 100vw; height: 100vh; position: relative; }
        
        .cube { position: absolute; width: 40px; height: 40px; border-radius: 12px; transform: translate(-50%, -50%); transition: background 0.5s; }
        #player { background: #4db8ff; box-shadow: 0 0 30px #4db8ff; z-index: 2; }
        #target { background: #ff9d00; box-shadow: 0 0 30px #ff9d0088; z-index: 1; border: 2px solid #fff; }

        /* UI Elements */
        #ui-layer { position: fixed; top: 20px; left: 20px; z-index: 20; pointer-events: none; }
        .controls { position: fixed; bottom: 30px; right: 20px; z-index: 20; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; backdrop-filter: blur(5px); }
        label { font-size: 0.9rem; font-weight: bold; margin-right: 10px; pointer-events: auto; }
        
        #overlay { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        button { padding: 15px 30px; font-size: 1rem; background: #4db8ff; border: none; border-radius: 8px; color: #000; font-weight: bold; }
    </style>
</head>
<body>

    <div id="overlay">
        <h2>Ambient Walker</h2>
        <p style="text-align: center; opacity: 0.7; padding: 0 20px;">Walk around your room to find the orange cube.</p>
        <button id="start-btn">Begin Journey</button>
    </div>

    <div id="ui-layer">
        <div id="status">Waiting for GPS...</div>
    </div>

    <div class="controls">
        <label for="endless-toggle">Endless Movement</label>
        <input type="checkbox" id="endless-toggle">
    </div>

    <div id="game-container">
        <div id="player" class="cube"></div>
        <div id="target" class="cube"></div>
    </div>

    <script>
        const player = document.getElementById('player');
        const target = document.getElementById('target');
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const status = document.getElementById('status');
        const endlessToggle = document.getElementById('endless-toggle');

        let playerPos = { x: window.innerWidth/2, y: window.innerHeight/2 };
        let targetPos = { x: 0, y: 0 };
        let originCoords = null;
        let noiseOffset = 0;
        
        const SENSITIVITY = 1500000; 

        // --- CALM AUDIO ENGINE ---
        let audioCtx, osc1, osc2, lfo, filter, mainGain;

        function initCalmAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Two oscillators for a "thick" chord sound (detuned slightly)
            osc1 = audioCtx.createOscillator();
            osc2 = audioCtx.createOscillator();
            filter = audioCtx.createBiquadFilter();
            mainGain = audioCtx.createGain();

            osc1.type = 'triangle'; 
            osc2.type = 'sawtooth'; // Sawtooth is harsh, but we will filter it!
            
            // Low frequencies for a "hum"
            osc1.frequency.value = 110; // A2
            osc2.frequency.value = 112; // Slight detune for "chorus" effect

            filter.type = 'lowpass';
            filter.frequency.value = 400; // Muffle the harshness
            filter.Q.value = 5;

            mainGain.gain.value = 0.2;

            osc1.connect(filter);
            osc2.connect(filter);
            filter.connect(mainGain);
            mainGain.connect(audioCtx.destination);

            osc1.start();
            osc2.start();
        }

        function moveTargetRandomly() {
            targetPos.x = Math.random() * (window.innerWidth - 60) + 30;
            targetPos.y = Math.random() * (window.innerHeight - 60) + 30;
            target.style.left = `${targetPos.x}px`;
            target.style.top = `${targetPos.y}px`;
        }

        function update() {
            // 1. Handle Endless Mode (Perlin-ish random drift)
            if (endlessToggle.checked) {
                noiseOffset += 0.001;
                targetPos.x += Math.sin(noiseOffset) * 2;
                targetPos.y += Math.cos(noiseOffset * 0.8) * 2;
                
                // Keep target in bounds
                targetPos.x = Math.max(30, Math.min(window.innerWidth - 30, targetPos.x));
                targetPos.y = Math.max(30, Math.min(window.innerHeight - 30, targetPos.y));
                
                target.style.left = `${targetPos.x}px`;
                target.style.top = `${targetPos.y}px`;
            }

            // 2. Audio Mapping
            if (osc1) {
                const dist = Math.sqrt(Math.pow(playerPos.x - targetPos.x, 2) + Math.pow(playerPos.y - targetPos.y, 2));
                const proximity = Math.max(0, 1 - (dist / 600)); 

                // Frequency gets slightly higher as you approach
                const baseFreq = 110 + (proximity * 110); 
                osc1.frequency.setTargetAtTime(baseFreq, audioCtx.currentTime, 0.1);
                osc2.frequency.setTargetAtTime(baseFreq * 1.01, audioCtx.currentTime, 0.1);

                // Open the filter (more "clarity") as you get closer
                filter.frequency.setTargetAtTime(300 + (proximity * 1500), audioCtx.currentTime, 0.1);
            }

            // 3. Collision Logic
            const distToTarget = Math.sqrt(Math.pow(playerPos.x - targetPos.x, 2) + Math.pow(playerPos.y - targetPos.y, 2));
            if (distToTarget < 45) {
                status.innerText = "Found! Relocating...";
                moveTargetRandomly();
            }

            requestAnimationFrame(update);
        }

        function handleLocation(position) {
            const { latitude, longitude, accuracy } = position.coords;
            status.innerText = `GPS Accuracy: ${Math.round(accuracy)}m`;

            if (!originCoords) {
                originCoords = { lat: latitude, lng: longitude };
                return;
            }

            const dy = (originCoords.lat - latitude) * SENSITIVITY;
            const dx = (longitude - originCoords.lng) * SENSITIVITY;

            playerPos.x = (window.innerWidth / 2) + dx;
            playerPos.y = (window.innerHeight / 2) + dy;

            player.style.left = `${playerPos.x}px`;
            player.style.top = `${playerPos.y}px`;
        }

        startBtn.addEventListener('click', () => {
            initCalmAudio();
            moveTargetRandomly();
            
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition(handleLocation, null, {
                    enableHighAccuracy: true,
                    maximumAge: 0
                });
            }
            overlay.style.display = 'none';
            requestAnimationFrame(update);
        });
    </script>
</body>
</html>
